volumes:
    langgraph-data:
        driver: local
    postgres-data:
services:
    langgraph-redis:
        image: redis:6
        healthcheck:
            test: redis-cli ping
            interval: 5s
            timeout: 1s
            retries: 5

    langgraph-postgres:
        image: postgres:16
        ports:
            - "5433:5432"
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-postgres}
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - langgraph-data:/var/lib/postgresql/data
        healthcheck:
            test: pg_isready -U ${POSTGRES_USER:-postgres}
            start_period: 10s
            timeout: 1s
            retries: 5
            interval: 5s
    langgraph-api:
        build:
            context: .
            dockerfile: Dockerfile.agent
        ports:
            - "8123:8000"
        depends_on:
            langgraph-redis:
                condition: service_healthy
            langgraph-postgres:
                condition: service_healthy
        env_file:
            - .env
        environment:
            REDIS_URI: redis://langgraph-redis:6379
            POSTGRES_URI: postgres://postgres:postgres@langgraph-postgres:5432/postgres?sslmode=disable
            DATABASE_URI: postgres://postgres:postgres@langgraph-postgres:5432/postgres?sslmode=disable
            LANGGRAPH_RUNTIME_EDITION: inmem
            LOG_DIR: /app/logs
            LOG_LEVEL: INFO
        volumes:
            - ./logs:/app/logs

    email-poller:
        build:
            context: .
            dockerfile: Dockerfile.email-poller
        container_name: email-poller
        depends_on:
            langgraph-api:
                condition: service_started
        env_file:
            - .env
        environment:
            PYTHONPATH: /app
            PYTHONUNBUFFERED: 1

        volumes:
            - ./logs:/app/logs
            - .:/app/output
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
            interval: 60s
            timeout: 10s
            retries: 3
            start_period: 30s